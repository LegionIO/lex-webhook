inherit_gem:
  rubocop-legion: config/lex.yml

# Runner modules are designed for include into Client; not standalone
Legion/Extension/RunnerIncludeHelpers:
  Enabled: false

# Private helpers and early-return methods return non-Hash values by design
Legion/Extension/RunnerReturnHash:
  Enabled: false

# Runner modules use Legion::JSON directly; helper mixin not included
Legion/HelperMigration/DirectJson:
  Enabled: false

# Class instance variables are used for lazy initialization patterns by design
ThreadSafety/ClassInstanceVariable:
  Enabled: false
